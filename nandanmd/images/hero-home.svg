<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E4DC"/>
      <stop offset="40%" style="stop-color:#EDE9E3"/>
      <stop offset="100%" style="stop-color:#E0DBD2"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(247,245,241,0.3)"/>
      <stop offset="60%" style="stop-color:rgba(247,245,241,0.6)"/>
      <stop offset="100%" style="stop-color:rgba(247,245,241,0.92)"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="blur"/>
      <feColorMatrix in="blur" type="saturate" values="0.95"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#overlay)"/>
  <!-- subtle accent -->
  <ellipse cx="1400" cy="400" rx="320" ry="280" fill="rgba(184,134,11,0.06)"/>
</svg>
